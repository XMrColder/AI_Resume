<path class="arr" d="M410 130 L410 144"/>
<path class="arr" d="M230 144 L590 144"/>
<path class="arr" d="M230 144 L230 156" marker-end="url(#a)"/>
<path class="arr" d="M590 144 L590 156" marker-end="url(#a)"/>

<path class="arr" d="M230 204 L230 240" marker-end="url(#a)"/>
<path class="arr" d="M590 204 L590 240" marker-end="url(#a)"/>

<path class="arr" d="M230 300 L230 322 L340 322 L340 346" marker-end="url(#a)"/>
<path class="arr" d="M590 300 L590 322 L480 322 L480 346" marker-end="url(#a)"/>

<path class="arr" d="M410 406 L410 452" marker-end="url(#a)"/>

<path class="arr" d="M410 504 L410 520"/>
<path class="arr" d="M230 520 L590 520"/>
<path class="arr" d="M230 520 L230 540" marker-end="url(#a)"/>
<path class="arr" d="M590 520 L590 540" marker-end="url(#a)"/>

<path class="arr" d="M230 600 L230 646" marker-end="url(#a)"/>
<path class="arr" d="M590 600 L590 646" marker-end="url(#a)"/>
</svg>
